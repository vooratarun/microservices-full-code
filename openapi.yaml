openapi: 3.0.0
info:
  title: E-Commerce Microservices API
  description: >
    Comprehensive API documentation for E-Commerce microservices architecture.
    The system consists of multiple independent services for authentication,
    customer management, products, orders, and payments.
  version: 1.0.0
  contact:
    name: Development Team
  license:
    name: MIT

servers:
  - url: http://localhost:8081
    description: Auth Service
  - url: http://localhost:8082
    description: Customer Service
  - url: http://localhost:8083
    description: Product Service
  - url: http://localhost:8084
    description: Order Service
  - url: http://localhost:8085
    description: Payment Service

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    Address:
      type: object
      properties:
        street:
          type: string
          example: "Main Street"
        houseNumber:
          type: string
          example: "123"
        zipCode:
          type: string
          example: "12345"
        city:
          type: string
          example: "New York"

    RegisterRequest:
      type: object
      required:
        - firstname
        - lastname
        - email
        - password
      properties:
        firstname:
          type: string
          example: "John"
        lastname:
          type: string
          example: "Doe"
        email:
          type: string
          format: email
          example: "john.doe@example.com"
        password:
          type: string
          format: password
          example: "securePassword123"

    LoginRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
          example: "john.doe@example.com"
        password:
          type: string
          format: password
          example: "securePassword123"

    AuthResponse:
      type: object
      properties:
        userId:
          type: string
          example: "user-123"
        email:
          type: string
          format: email
          example: "john.doe@example.com"
        firstname:
          type: string
          example: "John"
        lastname:
          type: string
          example: "Doe"
        token:
          type: string
          example: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."

    CustomerRequest:
      type: object
      required:
        - firstname
        - lastname
        - email
      properties:
        id:
          type: string
          example: "cust-123"
        firstname:
          type: string
          example: "Jane"
        lastname:
          type: string
          example: "Smith"
        email:
          type: string
          format: email
          example: "jane.smith@example.com"
        address:
          $ref: "#/components/schemas/Address"

    CustomerResponse:
      type: object
      properties:
        id:
          type: string
          example: "cust-123"
        firstname:
          type: string
          example: "Jane"
        lastname:
          type: string
          example: "Smith"
        email:
          type: string
          format: email
          example: "jane.smith@example.com"
        address:
          $ref: "#/components/schemas/Address"

    ProductRequest:
      type: object
      required:
        - name
        - description
        - availableQuantity
        - price
        - categoryId
      properties:
        id:
          type: integer
          example: 1
        name:
          type: string
          example: "Laptop"
        description:
          type: string
          example: "High-performance laptop"
        availableQuantity:
          type: number
          example: 50
        price:
          type: number
          format: decimal
          example: 999.99
        categoryId:
          type: integer
          example: 1

    ProductResponse:
      type: object
      properties:
        id:
          type: integer
          example: 1
        name:
          type: string
          example: "Laptop"
        description:
          type: string
          example: "High-performance laptop"
        availableQuantity:
          type: number
          example: 50
        price:
          type: number
          format: decimal
          example: 999.99
        categoryId:
          type: integer
          example: 1
        categoryName:
          type: string
          example: "Electronics"
        categoryDescription:
          type: string
          example: "Electronic devices"

    ProductPurchaseRequest:
      type: object
      required:
        - productId
        - quantity
      properties:
        productId:
          type: integer
          example: 1
        quantity:
          type: number
          example: 2

    ProductPurchaseResponse:
      type: object
      properties:
        productId:
          type: integer
          example: 1
        name:
          type: string
          example: "Laptop"
        price:
          type: number
          format: decimal
          example: 999.99
        quantity:
          type: number
          example: 2

    PaymentMethod:
      type: string
      enum:
        - CREDIT_CARD
        - PAYPAL
        - BANK_TRANSFER
      example: "CREDIT_CARD"

    OrderRequest:
      type: object
      required:
        - amount
        - paymentMethod
        - customerId
        - products
      properties:
        id:
          type: integer
          example: 1
        reference:
          type: string
          example: "ORD-20240101-001"
        amount:
          type: number
          format: decimal
          example: 1999.98
        paymentMethod:
          $ref: "#/components/schemas/PaymentMethod"
        customerId:
          type: string
          example: "cust-123"
        products:
          type: array
          items:
            $ref: "#/components/schemas/ProductPurchaseRequest"

    OrderResponse:
      type: object
      properties:
        id:
          type: integer
          example: 1
        reference:
          type: string
          example: "ORD-20240101-001"
        amount:
          type: number
          format: decimal
          example: 1999.98
        paymentMethod:
          $ref: "#/components/schemas/PaymentMethod"
        customerId:
          type: string
          example: "cust-123"

    OrderLineResponse:
      type: object
      properties:
        id:
          type: integer
          example: 1
        orderId:
          type: integer
          example: 1
        productId:
          type: integer
          example: 1
        quantity:
          type: number
          example: 2
        price:
          type: number
          format: decimal
          example: 999.99

    CustomerInfo:
      type: object
      properties:
        id:
          type: string
          example: "cust-123"
        firstname:
          type: string
          example: "John"
        lastname:
          type: string
          example: "Doe"
        email:
          type: string
          format: email
          example: "john.doe@example.com"

    PaymentRequest:
      type: object
      required:
        - amount
        - paymentMethod
        - orderId
        - orderReference
        - customer
      properties:
        id:
          type: integer
          example: 1
        amount:
          type: number
          format: decimal
          example: 1999.98
        paymentMethod:
          $ref: "#/components/schemas/PaymentMethod"
        orderId:
          type: integer
          example: 1
        orderReference:
          type: string
          example: "ORD-20240101-001"
        customer:
          $ref: "#/components/schemas/CustomerInfo"

    ErrorResponse:
      type: object
      properties:
        timestamp:
          type: string
          format: date-time
        status:
          type: integer
          example: 400
        error:
          type: string
          example: "Bad Request"
        message:
          type: string
          example: "Validation failed"
        details:
          type: string
          example: "Field validation error"

paths:
  /api/v1/auth/register:
    post:
      tags:
        - Authentication
      summary: Register a new user
      description: Creates a new user account and returns authentication token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        '201':
          description: User successfully registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        '400':
          description: Invalid input data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/auth/login:
    post:
      tags:
        - Authentication
      summary: Login user
      description: Authenticates user and returns JWT token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        '200':
          description: User successfully logged in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        '400':
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        '401':
          description: Authentication failed

  /api/v1/auth/logout/{userId}:
    post:
      tags:
        - Authentication
      summary: Logout user
      description: Logs out a user by invalidating their session
      security:
        - bearerAuth: []
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
          example: "user-123"
      responses:
        '204':
          description: User successfully logged out
        '401':
          description: Unauthorized - Invalid or missing token

  /api/v1/customers:
    post:
      tags:
        - Customers
      summary: Create a new customer
      description: Creates a new customer record
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CustomerRequest"
      responses:
        '200':
          description: Customer successfully created
          content:
            application/json:
              schema:
                type: string
                example: "cust-123"
        '400':
          description: Invalid input data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        '401':
          description: Unauthorized

    get:
      tags:
        - Customers
      summary: Get all customers
      description: Retrieves a list of all customers
      security:
        - bearerAuth: []
      responses:
        '200':
          description: List of customers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CustomerResponse"
        '401':
          description: Unauthorized

    put:
      tags:
        - Customers
      summary: Update customer
      description: Updates an existing customer record
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CustomerRequest"
      responses:
        '202':
          description: Customer successfully updated
        '400':
          description: Invalid input data
        '401':
          description: Unauthorized
        '404':
          description: Customer not found

  /api/v1/customers/{customer-id}:
    get:
      tags:
        - Customers
      summary: Get customer by ID
      description: Retrieves a specific customer by ID
      security:
        - bearerAuth: []
      parameters:
        - name: customer-id
          in: path
          required: true
          schema:
            type: string
          example: "cust-123"
      responses:
        '200':
          description: Customer details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CustomerResponse"
        '401':
          description: Unauthorized
        '404':
          description: Customer not found

    delete:
      tags:
        - Customers
      summary: Delete customer
      description: Deletes a customer record
      security:
        - bearerAuth: []
      parameters:
        - name: customer-id
          in: path
          required: true
          schema:
            type: string
          example: "cust-123"
      responses:
        '202':
          description: Customer successfully deleted
        '401':
          description: Unauthorized
        '404':
          description: Customer not found

  /api/v1/customers/exists/{customer-id}:
    get:
      tags:
        - Customers
      summary: Check if customer exists
      description: Checks if a customer exists by ID
      security:
        - bearerAuth: []
      parameters:
        - name: customer-id
          in: path
          required: true
          schema:
            type: string
          example: "cust-123"
      responses:
        '200':
          description: Customer existence status
          content:
            application/json:
              schema:
                type: boolean
        '401':
          description: Unauthorized

  /api/v1/products:
    post:
      tags:
        - Products
      summary: Create a new product
      description: Creates a new product
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProductRequest"
      responses:
        '200':
          description: Product successfully created
          content:
            application/json:
              schema:
                type: integer
                example: 123
        '400':
          description: Invalid input data
        '401':
          description: Unauthorized

    get:
      tags:
        - Products
      summary: Get all products
      description: Retrieves a list of all products
      security:
        - bearerAuth: []
      responses:
        '200':
          description: List of products
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ProductResponse"
        '401':
          description: Unauthorized

  /api/v1/products/{product-id}:
    get:
      tags:
        - Products
      summary: Get product by ID
      description: Retrieves a specific product by ID
      security:
        - bearerAuth: []
      parameters:
        - name: product-id
          in: path
          required: true
          schema:
            type: integer
          example: 123
      responses:
        '200':
          description: Product details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductResponse"
        '401':
          description: Unauthorized
        '404':
          description: Product not found

  /api/v1/products/purchase:
    post:
      tags:
        - Products
      summary: Purchase products
      description: Processes a purchase request for multiple products
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: "#/components/schemas/ProductPurchaseRequest"
      responses:
        '200':
          description: Purchase processed successfully
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ProductPurchaseResponse"
        '400':
          description: Invalid input data
        '401':
          description: Unauthorized

  /api/v1/orders:
    post:
      tags:
        - Orders
      summary: Create a new order
      description: Creates a new order
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OrderRequest"
      responses:
        '200':
          description: Order successfully created
          content:
            application/json:
              schema:
                type: integer
                example: 456
        '400':
          description: Invalid input data
        '401':
          description: Unauthorized

    get:
      tags:
        - Orders
      summary: Get all orders
      description: Retrieves a list of all orders
      security:
        - bearerAuth: []
      responses:
        '200':
          description: List of orders
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/OrderResponse"
        '401':
          description: Unauthorized

  /api/v1/orders/{order-id}:
    get:
      tags:
        - Orders
      summary: Get order by ID
      description: Retrieves a specific order by ID
      security:
        - bearerAuth: []
      parameters:
        - name: order-id
          in: path
          required: true
          schema:
            type: integer
          example: 456
      responses:
        '200':
          description: Order details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderResponse"
        '401':
          description: Unauthorized
        '404':
          description: Order not found

  /api/v1/order-lines/order/{order-id}:
    get:
      tags:
        - Order Lines
      summary: Get order line items
      description: Retrieves all line items for a specific order
      security:
        - bearerAuth: []
      parameters:
        - name: order-id
          in: path
          required: true
          schema:
            type: integer
          example: 456
      responses:
        '200':
          description: List of order line items
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/OrderLineResponse"
        '401':
          description: Unauthorized
        '404':
          description: Order not found

  /api/v1/payments:
    post:
      tags:
        - Payments
      summary: Create a new payment
      description: Processes a payment for an order
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PaymentRequest"
      responses:
        '200':
          description: Payment successfully processed
          content:
            application/json:
              schema:
                type: integer
                example: 789
        '400':
          description: Invalid input data
        '401':
          description: Unauthorized
        '402':
          description: Payment declined

security:
  - bearerAuth: []

tags:
  - name: Authentication
    description: User registration and authentication endpoints
  - name: Customers
    description: Customer management endpoints
  - name: Products
    description: Product management endpoints
  - name: Orders
    description: Order management endpoints
  - name: Order Lines
    description: Order line items endpoints
  - name: Payments
    description: Payment processing endpoints

